<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictle – Daily Definition Game</title>
  <meta name="description" content="Guess the word definition. One word. One attempt. Every day." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://playdictle.vercel.app/" />
  <meta property="og:title" content="Dictle – Daily Definition Game" />
  <meta property="og:description" content="One word. One attempt. Every day." />
  <meta property="og:image" content="https://playdictle.vercel.app/og.png?v=2" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Dictle – Daily Definition Game" />
  <meta name="twitter:description" content="One word. One attempt. Every day." />
  <link rel="canonical" href="https://playdictle.vercel.app/" />
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"Dictle","url":"https://playdictle.vercel.app/","description":"A daily word definition game. One word, one attempt, every day.","applicationCategory":"Game","operatingSystem":"All"}
  </script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x1F4D6;</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #EDECEA;
      --text:         #141414;
      --muted:        #A8A5A0;
      --border:       #D5D2CD;
      --border-strong:#A8A5A0;
      --good:         #3A7A35;
      --mid:          #8A7A25;
      --bad:          #A04030;
      --font-display: "Cormorant Garamond", Georgia, serif;
      --font-serif:   "Source Serif 4", Georgia, serif;
      --font-sans:    "Helvetica Neue", Arial, sans-serif;
    }

    [data-theme="dark"] {
      --bg:           #1A1917;
      --text:         #E8E5E0;
      --muted:        #6B6864;
      --border:       #2E2C2A;
      --border-strong:#4A4845;
      --good:         #5AAE55;
      --mid:          #B8A840;
      --bad:          #C05545;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      transition: background .25s ease, color .25s ease;
    }

    /* HEADER */
    header {
      width: 100%;
      max-width: 900px;
      padding: 32px 48px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.01em;
    }
    .theme-switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }
    .theme-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    .theme-switch-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 100px;
      transition: background .25s ease;
      cursor: pointer;
    }
    .theme-switch-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: var(--text);
      border-radius: 50%;
      transition: transform .25s cubic-bezier(.22,1,.36,1), background .25s ease;
    }
    .theme-switch input:checked + .theme-switch-track::after {
      transform: translateX(20px);
    }
    .icon-sun { display: none; }
    .icon-moon { display: block; }

    /* MAIN — centered column, generous width */
    main {
      width: 100%;
      max-width: 900px;
      padding: 0 48px 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* DAY LABEL */
    .day-label {
      font-family: var(--font-sans);
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* WORD — massive hero */
    #word-display {
      font-family: var(--font-display);
      font-size: clamp(5rem, 14vw, 10rem);
      line-height: 0.88;
      color: var(--text);
      letter-spacing: -0.03em;
      font-weight: 700;
      margin-bottom: 22px;
      width: 100%;
    }

    #word-phonetic {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    #word-pos {
      font-family: var(--font-sans);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* INPUT SECTION — constrained centered width */
    .input-wrap {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-top: 36px;
    }

    .input-label {
      display: none;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-sans);
      font-style: normal;
      font-size: 1.15rem;
      line-height: 1.7;
      padding: 0 0 16px;
      resize: none;
      min-height: 56px;
      outline: none;
      text-align: left;
      transition: border-color .2s;
    }
    textarea::placeholder { color: #B8B5B0; }
    textarea:focus { border-color: var(--text); }
    textarea:disabled { opacity: 0.4; cursor: not-allowed; }

    /* WORD CONTEXT BLOCK — collapsible hint + etymology */
    .word-context-block {
      width: 100%;
      margin: 0 0 20px;
    }
    .word-context-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      transition: color .2s;
    }
    .word-context-toggle:hover { color: var(--text); }
    .word-context-label {
      font-family: var(--font-sans);
      font-size: 0.54rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .word-context-arrow {
      transition: transform .3s cubic-bezier(.22,1,.36,1);
      flex-shrink: 0;
      margin-top: 1px;
    }
    .word-context-toggle[aria-expanded="true"] .word-context-arrow {
      transform: rotate(180deg);
    }
    .word-context-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows .38s cubic-bezier(.22,1,.36,1);
    }
    .word-context-body.open {
      grid-template-rows: 1fr;
    }
    .word-context-inner {
      overflow: hidden;
    }
    .word-context-content {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px 0 6px;
    }
    .word-info-hint {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.92rem;
      color: var(--text);
      letter-spacing: 0.01em;
      line-height: 1.72;
      text-align: left;
      opacity: 0.7;
    }
    .word-info-etym {
      font-family: var(--font-sans);
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: left;
      line-height: 1.65;
    }
    .word-info-etym::before {
      content: 'Etymology  ';
      color: var(--border-strong);
      font-weight: 600;
      letter-spacing: 0.16em;
    }

    /* SUBMIT */
    .btn-submit {
      width: 100%;
      padding: 20px;
      background: var(--text);
      color: var(--bg);
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      margin-top: 18px;
      transition: opacity .2s, transform .1s;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.72; }
    .btn-submit:active:not(:disabled) { transform: scale(0.99); }
    .btn-submit:disabled { opacity: 0.15; cursor: not-allowed; }

    /* ERROR + ALREADY PLAYED */
    .error-banner {
      display: none;
      font-family: var(--font-sans);
      font-size: 0.62rem;
      color: var(--bad);
      padding: 10px 0;
      margin-top: 10px;
      letter-spacing: 0.04em;
      text-align: left;
      width: 100%;
    }

    #already-played {
      display: none;
      text-align: center;
      padding: 16px 0 0;
    }
    #already-played p {
      font-family: var(--font-sans);
      font-size: 0.56rem;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    #already-played strong {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--text);
      font-weight: 400;
    }

    /* RESULTS */
    #results-card {
      display: none;
      padding-top: 72px;
      width: 100%;
      max-width: 640px;
      text-align: center;
    }
    #results-card.visible {
      display: block;
      animation: rise .55s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Score hero */
    .result-score-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 12px;
      position: relative;
    }
    .result-score-line {
      display: flex;
      align-items: baseline;
      gap: 4px;
      line-height: 1;
    }
    .result-score-num {
      font-family: var(--font-display);
      font-size: clamp(5.5rem, 18vw, 8rem);
      line-height: 1;
      letter-spacing: -0.05em;
      color: var(--text);
      font-weight: 400;
    }
    .result-score-denom-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding-bottom: 6px;
    }
    .result-score-denom {
      font-family: var(--font-sans);
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* Arc smile beneath score */
    .result-arc-wrap {
      margin-top: 18px;
      margin-bottom: 10px;
    }
    .result-arc-wrap svg { overflow: visible; }

    .result-verdict {
      font-family: var(--font-serif);
      font-size: 0.88rem;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.01em;
      margin-bottom: 52px;
      margin-top: 4px;
    }

    /* Stacked comparison */
    .def-compare {
      display: flex;
      flex-direction: column;
      text-align: left;
    }
    .def-block {
      border-top: 1px solid var(--border);
      padding: 28px 0;
    }
    .def-block-label {
      font-family: var(--font-sans);
      font-size: 0.5rem;
      color: var(--text);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .def-block-label::before {
      content: '•';
      color: var(--muted);
      font-size: 0.7rem;
    }
    .def-block-text {
      font-family: var(--font-serif);
      font-size: 0.97rem;
      line-height: 1.72;
      color: var(--text);
    }

    /* Share button */
    .btn-share {
      width: 100%;
      padding: 18px;
      background: transparent;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border: 1px solid var(--text);
      border-radius: 0;
      cursor: pointer;
      margin-top: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .15s, color .15s;
    }
    .btn-share:hover { background: var(--text); color: var(--bg); }
    .btn-share.copied { background: var(--text); color: var(--bg); }

    /* SCORE REVEAL OVERLAY */
    #score-reveal {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      display: flex;
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s ease;
    }
    #score-reveal.active {
      opacity: 1;
      pointer-events: all;
    }
    #score-reveal.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .reveal-word {
      font-family: var(--font-display);
      font-size: clamp(0.9rem, 3vw, 1.15rem);
      color: var(--muted);
      font-style: italic;
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }
    .reveal-score-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .reveal-score {
      font-family: var(--font-display);
      font-size: clamp(8rem, 35vw, 13rem);
      line-height: 1;
      color: var(--text);
      letter-spacing: -0.06em;
      font-weight: 400;
      transition: none;
    }
    .reveal-denom {
      font-family: var(--font-sans);
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.22em;
      margin-top: 8px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    /* Arc that grows in after count ends */
    .reveal-arc {
      margin-top: 4px;
      margin-bottom: 44px;
      opacity: 0;
      transform: scaleX(0.4);
      transition: opacity .6s ease, transform .6s cubic-bezier(.22,1,.36,1);
    }
    .reveal-arc.visible { opacity: 1; transform: scaleX(1); }
    .reveal-arc svg { overflow: visible; }
    .reveal-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 280px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .5s ease, transform .5s cubic-bezier(.22,1,.36,1);
    }
    .reveal-actions.visible { opacity: 1; transform: translateY(0); }
    .btn-lock {
      width: 100%;
      padding: 18px;
      background: var(--text);
      color: var(--bg);
      font-family: var(--font-sans);
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      border-radius: 0;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-lock:hover { opacity: 0.75; }
    .reveal-attempt-warn {
      font-family: var(--font-sans);
      font-size: 0.54rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-align: center;
      max-width: 240px;
      line-height: 1.6;
    }
    .reveal-attempt-counter {
      font-family: var(--font-sans);
      font-size: 0.54rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      header, main { padding-left: 28px; padding-right: 28px; }
      #word-display { font-size: clamp(3.5rem, 18vw, 6rem); }
      .def-compare {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }
      .def-divider {
        height: 1px;
        width: 100%;
        margin: 0 0 28px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Dictle</div>
  <label class="theme-switch" aria-label="Toggle dark mode">
    <input type="checkbox" id="theme-toggle">
    <span class="theme-switch-track"></span>
  </label>
</header>

<main>

  <div class="day-label" id="day-label">—</div>
  <div id="word-display">—</div>
  <div id="word-phonetic"></div>
  <div id="word-pos"></div>
  <div class="input-wrap">
    <div class="input-label">Write your definition</div>
    <div class="word-context-block">
      <button class="word-context-toggle" id="word-context-toggle" aria-expanded="false">
        <span class="word-context-label">About this word</span>
        <svg class="word-context-arrow" width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1.5 3.5L5 6.5L8.5 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="word-context-body" id="word-context-body">
        <div class="word-context-inner">
          <div class="word-context-content">
            <div id="word-hint" class="word-info-hint"></div>
            <div id="word-etym" class="word-info-etym"></div>
          </div>
        </div>
      </div>
    </div>
    <textarea id="user-input" maxlength="300" placeholder="What does it mean…" rows="2"></textarea>

    <button class="btn-submit" id="btn-submit" disabled>Submit</button>
    <div class="error-banner" id="error-banner"></div>
    <div id="already-played">
      <p>Already played today</p>
      <strong id="ap-score">—</strong>
    </div>
  </div>

  <div id="results-card">
    <div class="result-score-hero">
      <div class="result-score-line">
        <span class="result-score-num" id="score-number">0</span>
        <div class="result-score-denom-wrap">
          <span class="result-score-denom">/ 100</span>
        </div>
      </div>
      <div class="result-arc-wrap" id="result-arc-wrap">
        <svg width="120" height="36" viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path id="result-arc-path" d="M10 8 Q60 52 110 8" stroke="#141414" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <div class="result-verdict" id="verdict-text">—</div>
    <span id="rp-emoji" style="display:none"></span>
    <div class="def-compare">
      <div class="def-block">
        <div class="def-block-label">You said</div>
        <div class="def-block-text" id="result-user-def">—</div>
      </div>
      <div class="def-block">
        <div class="def-block-label">The definition</div>
        <div class="def-block-text" id="result-correct-def">—</div>
      </div>
    </div>
    <button class="btn-share" id="btn-share">Share result</button>
  </div>

</main>

<div id="score-reveal">
  <div class="reveal-word" id="reveal-word">—</div>
  <div class="reveal-score-wrap">
    <div class="reveal-score" id="reveal-score">0</div>
    <div class="reveal-denom">/ 100</div>
    <div class="reveal-arc" id="reveal-arc">
      <svg width="120" height="36" viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 8 Q60 52 110 8" stroke="#141414" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
  <div class="reveal-attempt-counter" id="reveal-attempt-counter"></div>
  <div class="reveal-actions" id="reveal-actions">
    <button class="btn-lock" id="btn-lock">See results &rarr;</button>
    <div class="reveal-attempt-warn" id="reveal-warn"></div>
  </div>
</div>

<script>
  /* ════════════════════════════════════════════════════
   * WORD BANK — 54 entries, hardcoded
   * Word selection is deterministic by UTC day so all
   * users see the same word. Cycles every 54 days.
   *
   * NOTE on sources:
   *  • Most words are standard English dictionary words.
   *  • A handful (sonder, vellichor, kenopsia, limerence,
   *    chrysalism, apricity) come from The Dictionary of
   *    Obscure Sorrows or niche usage — not in Merriam-
   *    Webster. They're intentionally included for
   *    discovery value, but flag them if you want a
   *    strictly-standard word list.
   * ════════════════════════════════════════════════════ */
  // ── WORD BANK ─────────────────────────────────────────────────────────────
  // 210 words tagged easy / medium / hard.
  // Difficulty guide:
  //   easy   — widely known, core vocab, often encountered in everyday reading
  //   medium — educated-adult vocabulary, may need a moment's thought
  //   hard   — rare, technical, borrowed, or niche; likely to surprise most players
  // ──────────────────────────────────────────────────────────────────────────

  const WORDS = [

    // ── EASY (70 words) ───────────────────────────────────────────────────
    { tier:"easy", word:"empathy",       pos:"noun",      phonetic:"EM-puh-thee",         definition:"the ability to understand and share the feelings of another person" },
    { tier:"easy", word:"paradox",       pos:"noun",      phonetic:"PAIR-uh-doks",         definition:"a statement that seems self-contradictory but may express a truth" },
    { tier:"easy", word:"catalyst",      pos:"noun",      phonetic:"KAT-uh-list",          definition:"a person or thing that precipitates an event or change" },
    { tier:"easy", word:"apathy",        pos:"noun",      phonetic:"AP-uh-thee",           definition:"lack of interest, enthusiasm, or concern" },
    { tier:"easy", word:"serendipity",   pos:"noun",      phonetic:"sair-un-DIP-ih-tee",   definition:"the occurrence of fortunate events by chance" },
    { tier:"easy", word:"labyrinth",     pos:"noun",      phonetic:"LAB-uh-rinth",         definition:"a complicated irregular network of passages or paths" },

    "absolution":    "Latin absolutio from absolvere (to set free) from ab- + solvere (to loosen) — a loosening from guilt",
    "bliss":         "Old English bliss, blīths from blīthe (blithe, joyful) — a state of perfect joyfulness",

    "tension":       "Latin tensio from tendere (to stretch)",
    "turmoil":       "Origin uncertain; possibly from Old French tremouille (mill hopper) — a turbulent, grinding confusion",
    "wistful":       "Probably from obsolete wistly (attentively) — gazing longingly and with quiet yearning",

    // Missing medium words
    "acrimony":      "Latin acrimonia from acer (sharp, pungent)",
    "ameliorate":    "Latin meliorare (to make better) from melior (better) from mel (honey)",
    "anodyne":       "Greek anōdynos from an- (without) + odynē (pain)",
    "apricity":      "Latin apricus (warmed by the sun) from aperire (to open) — open to the sun's warmth",
    "byzantine":     "From Byzantium (Constantinople) — the Eastern Roman Empire's notoriously complex court bureaucracy",
    "chicanery":     "French chicane (legal trickery) from chicaner (to quibble) — petty deception; legal trickery",
    "chrysalism":    "Greek chrysalis (golden shell of a pupa) + -ism — coined by John Koenig; the cocoon-like comfort indoors",

    "conflate":      "Latin conflare (to blow together, to fuse) from con- + flare (to blow)",
    "contrite":      "Latin contritus (worn down) from conterere (to grind) from con- + terere (to rub)",
    "corpulent":     "Latin corpulentus from corpus (body) + -ulentus (full of)",
    "didactic":      "Greek didaktikos (apt at teaching) from didaskein (to teach)",
    "diffident":     "Latin diffidere (to distrust) from dis- + fidere (to trust)",
    "ennui":         "French ennui from Old French enui from anuier (to annoy, bore) from Latin inodiare (to make hateful) — weary boredom",
    "ephemeron":     "Greek ephēmeron, neuter of ephēmeros (lasting a day) from epi- (on) + hēmera (day) — a one-day thing",
    "equanimity":    "Latin aequanimitas from aequus (equal) + animus (mind)",
    "ethereal":      "Latin aetherius from Greek aitherios from aithēr (upper air)",
    "halcyon":       "Greek alkyon (kingfisher) — the bird was fabled to nest on a calm sea, charming the winds to peace",
    "idiosyncrasy":  "Greek idiosynkrasia from idios (own) + synkrasis (mixture)",
    "ineffable":     "Latin ineffabilis from in- + effabilis (speakable) from effari (to speak out)",
    "insouciant":    "French insouciant from in- + soucier (to trouble) from Latin sollicitare (to agitate)",
    "kenopsia":      "Greek kenos (empty) + opsis (sight) — coined by John Koenig; the eerie feeling of an empty familiar place",
    "lassitude":     "Latin lassitudo from lassus (weary)",
    "limerence":     "Coined 1977 by psychologist Dorothy Tennov from no classical root — a neologism for obsessive infatuation",
    "liminal":       "Latin limen/liminis (threshold)",
    "mellifluous":   "Latin mellifluus from mel/mellis (honey) + fluere (to flow)",
    "obstinate":     "Latin obstinatus from obstinare (to persist) from ob- + stare (to stand)",
    "perspicuous":   "Latin perspicuus from perspicere (to see through) from per- + specere (to look)",

    "quixotic":      "From Don Quixote, Cervantes' 1605 novel — the impractical knight who tilted at windmills",
    "sanguine":      "Latin sanguineus from sanguis (blood) — associated with the sanguine humour in ancient medicine",
    "soliloquy":     "Latin soliloquium from solus (alone) + loqui (to speak)",
    "sonder":        "Coined by John Koenig (Dictionary of Obscure Sorrows) — no classical root; invented from German sonder- (special)",
    "subterfuge":    "Latin subterfugere (to flee secretly) from subter- (beneath) + fugere (to flee)",
    "sycophant":     "Greek sykophantēs from sykon (fig) + phainein (to show) — possibly 'fig-shower'; origin debated",
    "torpor":        "Latin torpor from torpere (to be numb or sluggish)",
    "trepidation":   "Latin trepidatio from trepidare (to hurry anxiously) from trepidus (alarmed)",
    "vellichor":     "Coined by John Koenig (Dictionary of Obscure Sorrows) — blend of vellum + ichor; the mood of used bookshops",
    "vicissitude":   "Latin vicissitudo from vicis (change, turn)",
  };

  /* ════════════════════════════════════════════════════
   * SCORING ENGINE — Claude API (/api/score on Vercel)
   *
   * Sends the player's answer + the correct definition to
   * the Vercel serverless function, which calls Claude and
   * returns a 0–100 score + one-line feedback.
   * Falls back to localFallbackScore() if the API is
   * unreachable or returns an error.
   * ════════════════════════════════════════════════════ */

  async function computeScore(userText) {
    const trimmed = userText.trim();
    if (!trimmed) return { score: 0, feedback: 'No definition entered.' };

    const wordCount = trimmed.split(/\s+/).filter(Boolean).length;
    if (trimmed.toLowerCase().includes(DAILY.word.toLowerCase()) && wordCount <= 3) {
      return { score: 0, feedback: 'Try to actually define it!' };
    }

    try {
      const res = await fetch('/api/score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          word:              DAILY.word,
          pos:               DAILY.pos,
          userDefinition:    trimmed,
          correctDefinition: DAILY.definition,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `API error ${res.status}`);
      }

      const data = await res.json();
      let score = Math.round(Math.max(0, Math.min(100, Number(data.score))));

      return { score, feedback: data.feedback || feedbackLine(score) };

    } catch (e) {
      console.warn('API scoring failed, falling back:', e);
      let score = localFallbackScore(trimmed);
      score = Math.max(0, Math.min(100, score));
      return { score, feedback: feedbackLine(score) };
    }
  }

  /* ── Local keyword fallback scorer (used when /api/score is unreachable) ── */
  function localFallbackScore(userText) {
    const normalize = s => s.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();
    const tokenize  = s => normalize(s).split(/\s+/).filter(Boolean);

    const userTokens    = new Set(tokenize(userText));
    const correctTokens = tokenize(DAILY.definition);

    // Stop-words to ignore in overlap calculation
    const STOP = new Set(['a','an','the','of','or','to','in','is','are','was','be','by','as','for','its','it','that','which','and','with','not','so','but','on','at','from','this']);

    const meaningful = correctTokens.filter(t => !STOP.has(t) && t.length > 2);
    if (!meaningful.length) return 20; // can't score, give partial credit

    let hits = 0;
    for (const token of meaningful) {
      // exact match or user word contains/is contained by correct token (handles stemming)
      if (userTokens.has(token) || [...userTokens].some(u => u.includes(token) || token.includes(u))) hits++;
    }

    const overlap = hits / meaningful.length;

    // Also check ALT_DEFINITIONS for this word
    const alts = ALT_DEFINITIONS[DAILY.word] || [];
    let bestAltOverlap = 0;
    for (const alt of alts) {
      const altTokens = tokenize(alt).filter(t => !STOP.has(t) && t.length > 2);
      if (!altTokens.length) continue;
      let altHits = 0;
      for (const t of altTokens) {
        if (userTokens.has(t) || [...userTokens].some(u => u.includes(t) || t.includes(u))) altHits++;
      }
      bestAltOverlap = Math.max(bestAltOverlap, altHits / altTokens.length);
    }

    const best = Math.max(overlap, bestAltOverlap);
    // Scale: 0% overlap → 5pts, 100% overlap → 85pts (local scorer is conservative)
    return Math.round(5 + best * 80);
  }

  function feedbackLine(score) {
    if (score >= 88) return 'Excellent — you nailed it.';
    if (score >= 70) return 'Great — got the core idea.';
    if (score >= 50) return 'Good effort — close to the mark.';
    if (score >= 30) return 'Partially there — check the correct definition.';
    if (score >   0) return 'Not quite — see the correct definition below.';
    return 'Way off — check the correct definition below.';
  }



  /* ════════════════════════════════════════════════════
   * HELPERS
   * ════════════════════════════════════════════════════ */
  function getVerdict(score, feedback) {
    if (feedback) return feedback;
    if (score >= 88) return "✦ Nailed it";
    if (score >= 70) return "⬆ Great definition";
    if (score >= 50) return "◈ Close enough";
    if (score >= 30) return "▽ Partially correct";
    return "✕ Off the mark";
  }

  function scoreColor(score) {
    if (score >= 65) return 'var(--good)';
    if (score >= 40) return 'var(--mid)';
    return 'var(--bad)';
  }

  function scoreToEmoji(score) {
    if (score >= 90) return '🤯';
    if (score >= 70) return '😌';
    if (score >= 50) return '😅';
    return '💀';
  }

  /* ════════════════════════════════════════════════════
   * REVEAL RESULTS
   * ════════════════════════════════════════════════════ */
  function revealResults(score, userDef, animate = true, feedback = '') {
    resultUserDef.textContent    = userDef;
    resultCorrectDef.textContent = DAILY.definition;
    verdictText.textContent      = getVerdict(score, feedback);
    rpEmoji.textContent          = scoreToEmoji(score);
    resultsCard.style.display    = 'block';
    resultsCard.classList.add('visible');
    lastScore = score;

    // Dynamic arc: curve depth and color reflect the score
    // Low score = shallow/flat arc (sad), high score = deep happy curve
    const arcPath = document.querySelector('#result-arc-wrap path');
    if (arcPath) {
      const arcColor = score >= 65 ? 'var(--good)' : score >= 40 ? 'var(--mid)' : 'var(--bad)';
      // Arc is always a smile — width grows with score
      // score 0 → narrow smile (x range 35–85), score 100 → wide smile (x range 5–115)
      const x1 = 35 - (score / 100) * 30;
      const x2 = 85 + (score / 100) * 30;
      const cy = 28; // fixed gentle curve depth
      arcPath.setAttribute('d', `M${x1} 8 Q60 ${cy} ${x2} 8`);
      arcPath.setAttribute('stroke', arcColor);
    }

    if (animate) {
      scoreNumber.textContent = 0;
      let current = 0;
      const step = Math.max(1, Math.ceil(score / 50));
      const timer = setInterval(() => {
        current = Math.min(current + step, score);
        scoreNumber.textContent = current;
        if (current >= score) { clearInterval(timer); }
      }, 20);
    } else {
      scoreNumber.textContent = score;
    }
  }

  function showAlreadyPlayed(score, userDef) {
    alreadyPlayed.style.display = 'block';
    apScore.textContent         = `${score}% match`;
    userInput.value             = userDef;
    userInput.disabled          = true;
    btnSubmit.disabled          = true;
  }

  function showError(msg) {
    errorBanner.textContent    = `⚠ ${msg}`;
    errorBanner.style.display  = 'block';
    btnSubmit.textContent      = 'Try again';
    btnSubmit.disabled         = false;
    userInput.disabled         = false;
  }

  function updateStreak() {
    const lastDay = parseInt(localStorage.getItem(LAST_DAY_KEY) || '0', 10);
    let streak    = parseInt(localStorage.getItem(STREAK_KEY)   || '0', 10);

    if      (lastDay === DAY_INDEX - 1) streak += 1;
    else if (lastDay !== DAY_INDEX)     streak  = 1;

    localStorage.setItem(STREAK_KEY,    streak);
    localStorage.setItem(LAST_DAY_KEY,  DAY_INDEX);
  }

  /* ════════════════════════════════════════════════════
   * TRY-AGAIN STATE
   * ════════════════════════════════════════════════════ */
  const MAX_ATTEMPTS = 1;
  let attemptCount   = 0;   // how many times submitted today
  let pendingScore   = null; // score waiting to be locked in
  let pendingResult  = null; // { score, userDef, feedback, hints }

  const scoreReveal       = document.getElementById('score-reveal');
  const revealScoreEl     = document.getElementById('reveal-score');
  const revealWordEl      = document.getElementById('reveal-word');
  const revealActionsEl   = document.getElementById('reveal-actions');
  const revealAttemptEl   = document.getElementById('reveal-attempt-counter');
  const revealWarnEl      = document.getElementById('reveal-warn');
  const btnLock           = document.getElementById('btn-lock');


  /* ── Show the full-screen score reveal ── */
  function showScoreReveal(score) {
    revealWordEl.textContent  = DAILY.word;
    revealScoreEl.textContent = 0;
    revealActionsEl.classList.remove('visible');
    revealAttemptEl.textContent = '';

    // Reset arc
    const revealArc = document.getElementById('reveal-arc');
    revealArc.classList.remove('visible');

    scoreReveal.classList.add('active');
    document.body.style.overflow = 'hidden';

    // Dramatic count-up: cubic ease-out, fast start → slow landing
    const duration = 2000; // ms total
    const startTime = performance.now();

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function tick(now) {
      const elapsed  = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased    = easeOut(progress);
      const display  = Math.round(eased * score);

      revealScoreEl.textContent = display;

      if (progress < 1) {
        requestAnimationFrame(tick);
      } else {
        revealScoreEl.textContent = score;
        // Arc animates in and reflects the score
        const revealArcPath = revealArc.querySelector('path');
        if (revealArcPath) {
          const arcColor = score >= 65 ? 'var(--good)' : score >= 40 ? 'var(--mid)' : 'var(--bad)';
          const x1 = 35 - (score / 100) * 30;
          const x2 = 85 + (score / 100) * 30;
          const cy = 28;
          revealArcPath.setAttribute('d', `M${x1} 8 Q60 ${cy} ${x2} 8`);
          revealArcPath.setAttribute('stroke', arcColor);
        }
        setTimeout(() => revealArc.classList.add('visible'), 120);
        // Buttons appear after comfortable pause
        setTimeout(() => revealActionsEl.classList.add('visible'), 480);
      }
    }

    requestAnimationFrame(tick);
  }

  /* ── Lock it in → dismiss overlay, show full results ── */
  function lockItIn() {
    scoreReveal.classList.add('fade-out');
    scoreReveal.classList.remove('active');
    document.body.style.overflow = '';

    const prev = (() => { try { return JSON.parse(localStorage.getItem(TODAY_KEY) || '{}'); } catch { return {}; } })();
    const bestResult = (prev.score !== undefined && prev.score > pendingResult.score)
      ? { ...prev, attempts: attemptCount }
      : { ...pendingResult, attempts: attemptCount };

    bestResult.hintUsed  = hintUsed  || prev.hintUsed  || false;
    bestResult.hint2Used = hint2Used || prev.hint2Used || false;

    localStorage.setItem(TODAY_KEY, JSON.stringify(bestResult));
    saveHistory(bestResult.score);
    updateStreak();

    // Wait for overlay fade before revealing results
    setTimeout(() => {
      scoreReveal.classList.remove('fade-out');
      revealResults(bestResult.score, bestResult.userDef, false, bestResult.feedback);
      showAlreadyPlayed(bestResult.score, bestResult.userDef);
      setTimeout(() => resultsCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 60);
    }, 350);
  }

  /* ── Try again → dismiss overlay, reset input ── */
  function tryAgain() {
    scoreReveal.classList.remove('active');
    document.body.style.overflow = '';

    // Reset input card
    userInput.value             = '';
    userInput.disabled          = false;
    userInput.style.borderColor = '';
    btnSubmit.disabled          = false;
    btnSubmit.textContent       = 'Submit definition';
    errorBanner.style.display   = 'none';

    userInput.focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  btnLock.addEventListener('click', lockItIn);

  // Dismiss on back button / escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && scoreReveal.classList.contains('active')) lockItIn();
  });

  /* ════════════════════════════════════════════════════
   * SUBMIT
   * ════════════════════════════════════════════════════ */
  btnSubmit.addEventListener('click', async () => {
    const userDef = userInput.value.trim();

    if (!userDef) {
      userInput.style.borderColor = 'var(--bad)';
      setTimeout(() => { userInput.style.borderColor = ''; }, 800);
      return;
    }

    userInput.disabled    = true;
    btnSubmit.disabled    = true;
    btnSubmit.textContent = 'Scoring…';
    errorBanner.style.display = 'none';

    try {
      const { score, feedback } = await computeScore(userDef);
      attemptCount++;
      pendingResult = { score, userDef, feedback };
      pendingScore  = score;

      showScoreReveal(score);

    } catch (err) {
      console.error(err);
      showError('Scoring failed — please refresh and try again.');
    }
  });

  /* ════════════════════════════════════════════════════
   * COPY RESULT — three-tier fallback
   * ════════════════════════════════════════════════════ */
  btnShare.addEventListener('click', () => {
    const score = lastScore ?? 0;
    const streak = parseInt(localStorage.getItem(STREAK_KEY) || '0', 10);
    const streakLine = streak >= 2 ? `\n🔥 ${streak} day streak` : '';
    const saved = (() => { try { return JSON.parse(localStorage.getItem(TODAY_KEY) || '{}'); } catch { return {}; } })();
    const attempts = saved.attempts || 1;
    const attemptLine = attempts > 1 ? ` · ${attempts} attempts` : '';
    const text =
      `Dictle #${GAME_DAY} ${scoreToEmoji(score)}\n` +
      `${DAILY.word} · ${score}/100${attemptLine}` +
      streakLine + '\n' +
      `Can you beat me? → https://playdictle.vercel.app`;

    function onCopied() {
      btnShare.textContent = '✓ Copied!';
      btnShare.classList.add('copied');
      setTimeout(() => {
        btnShare.innerHTML = 'Share result';
        btnShare.classList.remove('copied');
      }, 2000);
    }

    // Tier 1: modern Clipboard API (requires HTTPS + user gesture — works on Vercel)
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).then(onCopied).catch(legacyCopy);
      return;
    }
    legacyCopy();

    // Tier 2: execCommand — works in HTTP / older browsers
    function legacyCopy() {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        if (document.execCommand('copy')) { onCopied(); }
        else { showShareModal(text); }
      } catch { showShareModal(text); }
      document.body.removeChild(ta);
    }
  });

  // Tier 3: modal — user copies manually
  function showShareModal(text) {
    const overlay = document.createElement('div');
    overlay.style.cssText =
      'position:fixed;inset:0;background:rgba(0,0,0,0.75);' +
      'display:flex;align-items:center;justify-content:center;z-index:999;padding:24px';
    overlay.innerHTML = `
      <div style="background:var(--surface);border:1px solid var(--border);
        border-radius:12px;padding:24px;max-width:400px;width:100%">
        <p style="font-family:var(--font-mono);font-size:0.7rem;color:var(--muted);
          margin-bottom:12px;letter-spacing:0.1em">COPY YOUR RESULT</p>
        <textarea readonly style="width:100%;background:var(--bg);color:var(--text);
          border:1px solid var(--border);border-radius:8px;padding:12px;
          font-family:var(--font-mono);font-size:0.78rem;line-height:1.6;
          resize:none;height:120px;outline:none">${text}</textarea>
        <button onclick="this.closest('[style]').remove()" style="
          margin-top:12px;width:100%;padding:10px;background:#3A3830;
          color:#EDEAE4;border:none;border-radius:2px;font-family:var(--font-mono);
          font-weight:800;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer">Close</button>
      </div>`;
    overlay.querySelector('textarea').addEventListener('focus', e => e.target.select());
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
    setTimeout(() => overlay.querySelector('textarea').select(), 50);
  }



  /* ── Cmd/Ctrl+Enter to submit ── */
  userInput.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && !btnSubmit.disabled) {
      e.preventDefault();
      btnSubmit.click();
    }
  });

  /* ════════════════════════════════════════════════════
   * HISTORY — store per-day scores for sparkline & stats
   * ════════════════════════════════════════════════════ */
  const HISTORY_KEY = 'dictle_history'; // { [dayIndex]: score }

  function saveHistory(score) {
    let hist = {};
    try { hist = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}'); } catch {}
    hist[DAY_INDEX] = score;
    // keep only last 90 days
    const keys = Object.keys(hist).map(Number).sort((a,b) => a-b);
    if (keys.length > 90) keys.slice(0, keys.length - 90).forEach(k => delete hist[k]);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}'); } catch { return {}; }
  }





  // ── Dark mode toggle ────────────────────────────────
  const themeToggle = document.getElementById('theme-toggle');
  const savedTheme = localStorage.getItem('dictle_theme');
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    themeToggle.checked = true;
  }

  themeToggle.addEventListener('change', () => {
    const next = themeToggle.checked ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('dictle_theme', next);
  });

  // ── Context accordion ───────────────────────────────
  const contextToggle = document.getElementById('word-context-toggle');
  const contextBody   = document.getElementById('word-context-body');
  if (contextToggle && contextBody) {
    contextToggle.addEventListener('click', () => {
      const expanded = contextToggle.getAttribute('aria-expanded') === 'true';
      contextToggle.setAttribute('aria-expanded', String(!expanded));
      contextBody.classList.toggle('open', !expanded);
    });
  }

  initUI();

  // ── Loading screen ──────────────────────────────────
</script>
