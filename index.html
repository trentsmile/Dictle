<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictle – Daily Definition Game</title>
  <meta name="description" content="Guess the word's definition. One word. One attempt. Every day." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── CSS Variables ─────────────────────────────── */
    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --border:    #2e2e2e;
      --accent:    #e8d5a3;
      --accent2:   #a3c4e8;
      --text:      #f0ece0;
      --muted:     #6b6460;
      --good:      #5cb88a;
      --mid:       #e8c35a;
      --bad:       #e86a5a;
      --radius:    12px;
      --font-disp: 'Playfair Display', serif;
      --font-mono: 'DM Mono', monospace;
      --font-ui:   'DM Sans', sans-serif;
    }

    /* ─── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    }

    /* ─── Header ─────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      margin-bottom: 40px;
    }

    .logo {
      font-family: var(--font-disp);
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    .streak-badge {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .streak-badge .badge-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      color: var(--accent);
    }

    /* ─── Cards ──────────────────────────────────────── */
    main {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    /* ─── Word Section ───────────────────────────────── */
    .day-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .word-display {
      font-family: var(--font-disp);
      font-size: clamp(2.4rem, 8vw, 3.6rem);
      font-weight: 900;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .word-pos {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ─── Input Section ──────────────────────────────── */
    .input-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 0.95rem;
      line-height: 1.6;
      padding: 14px 16px;
      resize: none;
      min-height: 90px;
      transition: border-color 0.2s;
      outline: none;
    }
    textarea:focus   { border-color: var(--accent); }
    textarea:disabled { opacity: 0.5; cursor: not-allowed; }

    .char-counter {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      text-align: right;
      margin-top: 6px;
      transition: color 0.2s;
    }
    .char-counter.warn { color: var(--mid); }
    .char-counter.full { color: var(--bad); }

    /* ─── Submit Button ──────────────────────────────── */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--bg);
      font-family: var(--font-ui);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 14px;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.88; }
    .btn-submit:active:not(:disabled) { transform: scale(0.99); }
    .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ─── Already Played Banner ──────────────────────── */
    #already-played {
      display: none;
      text-align: center;
      padding: 14px 0 4px;
    }
    #already-played p {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    #already-played strong {
      font-family: var(--font-disp);
      font-size: 1.4rem;
      color: var(--accent);
    }

    /* ─── Results Card ───────────────────────────────── */
    #results-card {
      display: none;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .score-ring-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }

    .score-ring {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 12px;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring circle {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
    }
    .score-ring .track { stroke: var(--border); }
    .score-ring .fill {
      stroke: var(--good);
      transition: stroke-dashoffset 1s cubic-bezier(0.16, 1, 0.3, 1), stroke 0.3s;
      stroke-dasharray: 339.292;
      stroke-dashoffset: 339.292;
    }

    .score-num {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: var(--font-disp);
      font-size: 2rem;
      font-weight: 900;
      line-height: 1;
    }
    .score-num small {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.1em;
    }

    .verdict {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      color: var(--accent2);
      text-align: center;
      max-width: 360px;
    }

    /* ─── Definition Comparison ──────────────────────── */
    .def-compare {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .def-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .def-block-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .def-block-text {
      font-size: 0.92rem;
      line-height: 1.55;
      color: var(--text);
    }
    .def-block.correct { border-color: #2e4a38; }
    .def-block.correct .def-block-label { color: var(--good); }

    /* ─── Share Button ───────────────────────────────── */
    .btn-share {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 0.85rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      transition: border-color 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-share:hover  { border-color: var(--accent); color: var(--accent); }
    .btn-share.copied { border-color: var(--good);   color: var(--good); }

    /* ─── Error Banner ───────────────────────────────── */
    .error-banner {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--bad);
      background: rgba(232,106,90,0.08);
      border: 1px solid rgba(232,106,90,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 12px;
      display: none;
    }

    /* ─── Footer ─────────────────────────────────────── */
    footer {
      margin-top: 48px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Dictle</div>
  <div class="streak-badge">
    🔥 streak <span class="badge-pill" id="streak-count">0</span>
  </div>
</header>

<main>

  <!-- ── Word of the Day ── -->
  <div class="card">
    <div class="day-label" id="day-label">—</div>
    <div class="word-display" id="word-display">—</div>
    <div class="word-pos" id="word-pos"></div>
  </div>

  <!-- ── Input ── -->
  <div class="card">
    <div class="input-label">Your definition</div>
    <textarea
      id="user-input"
      maxlength="150"
      placeholder="Type your definition here…"
      rows="3"
    ></textarea>
    <div class="char-counter" id="char-counter">0 / 150</div>

    <button class="btn-submit" id="btn-submit" disabled>Submit</button>
    <div class="error-banner" id="error-banner"></div>

    <!-- Shown after submission -->
    <div id="already-played">
      <p>You've already played today.</p>
      <strong id="ap-score">—</strong>
    </div>
  </div>

  <!-- ── Results (hidden until submitted) ── -->
  <div class="card" id="results-card">
    <div class="score-ring-wrap">
      <div class="score-ring">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle class="track" cx="60" cy="60" r="54"/>
          <circle class="fill"  cx="60" cy="60" r="54" id="ring-fill"/>
        </svg>
        <div class="score-num">
          <span id="score-number">0</span>
          <small>/ 100</small>
        </div>
      </div>
      <div class="verdict" id="verdict-text">—</div>
    </div>

    <div class="def-compare">
      <div class="def-block">
        <div class="def-block-label">Your definition</div>
        <div class="def-block-text" id="result-user-def">—</div>
      </div>
      <div class="def-block correct">
        <div class="def-block-label">Correct definition</div>
        <div class="def-block-text" id="result-correct-def">—</div>
      </div>
    </div>

    <button class="btn-share" id="btn-share">
      <span>📋</span> Copy result
    </button>
  </div>

</main>

<footer>One word · One attempt · Every day</footer>

<script>
  /* ════════════════════════════════════════════════════
   * WORD BANK — 54 entries, hardcoded
   * Word selection is deterministic by UTC day so all
   * users see the same word. Cycles every 54 days.
   *
   * NOTE on sources:
   *  • Most words are standard English dictionary words.
   *  • A handful (sonder, vellichor, kenopsia, limerence,
   *    chrysalism, apricity) come from The Dictionary of
   *    Obscure Sorrows or niche usage — not in Merriam-
   *    Webster. They're intentionally included for
   *    discovery value, but flag them if you want a
   *    strictly-standard word list.
   * ════════════════════════════════════════════════════ */
  const WORDS = [
    { word: "ephemeral",    pos: "adjective", definition: "lasting for a very short time" },
    { word: "mellifluous",  pos: "adjective", definition: "having a pleasantly smooth and musical sound" },
    { word: "petrichor",    pos: "noun",      definition: "the earthy scent produced when rain falls on dry soil" },
    { word: "liminal",      pos: "adjective", definition: "relating to a transitional or threshold stage between two states" },
    { word: "serendipity",  pos: "noun",      definition: "the occurrence of fortunate events by chance" },
    { word: "labyrinth",    pos: "noun",      definition: "a complicated irregular network of passages or paths" },
    { word: "ethereal",     pos: "adjective", definition: "extremely delicate and light, seeming too perfect for this world" },
    { word: "laconic",      pos: "adjective", definition: "using very few words to express much" },
    { word: "perspicuous",  pos: "adjective", definition: "clearly expressed and easily understood" },
    { word: "soliloquy",    pos: "noun",      definition: "an act of speaking one's thoughts aloud when alone or regardless of hearers" },
    { word: "tenacious",    pos: "adjective", definition: "holding firmly to a purpose or belief; not giving up easily" },
    { word: "quixotic",     pos: "adjective", definition: "exceedingly idealistic and unrealistic in pursuit of goals" },
    { word: "hubris",       pos: "noun",      definition: "excessive pride or self-confidence that leads to downfall" },
    { word: "catharsis",    pos: "noun",      definition: "the release of pent-up emotions through art or dramatic experience" },
    { word: "apathy",       pos: "noun",      definition: "lack of interest, enthusiasm, or concern" },
    { word: "oblivion",     pos: "noun",      definition: "the state of being unaware of or forgotten by the world" },
    { word: "eloquent",     pos: "adjective", definition: "fluent and persuasive in speaking or writing" },
    { word: "panacea",      pos: "noun",      definition: "a solution or remedy claimed to cure all difficulties or diseases" },
    { word: "zeitgeist",    pos: "noun",      definition: "the defining spirit or mood of a particular period in history" },
    { word: "vicarious",    pos: "adjective", definition: "experienced through another person's actions rather than one's own" },
    { word: "axiom",        pos: "noun",      definition: "a statement regarded as self-evidently true" },
    { word: "inertia",      pos: "noun",      definition: "tendency to remain unchanged or resist change without an outside force" },
    { word: "paradox",      pos: "noun",      definition: "a statement that seems self-contradictory but may express a truth" },
    { word: "nuance",       pos: "noun",      definition: "a subtle difference in meaning, expression, or response" },
    { word: "catalyst",     pos: "noun",      definition: "a person or thing that precipitates an event or change" },
    { word: "empathy",      pos: "noun",      definition: "the ability to understand and share the feelings of another person" },
    { word: "entropy",      pos: "noun",      definition: "gradual decline into disorder and unpredictability" },
    { word: "rhetoric",     pos: "noun",      definition: "language designed to persuade or impress, sometimes at the expense of honesty" },
    { word: "idiosyncrasy", pos: "noun",      definition: "a mode of behaviour or thinking peculiar to a person" },
    { word: "palimpsest",   pos: "noun",      definition: "something altered but still bearing visible traces of an earlier form" },
    { word: "ennui",        pos: "noun",      definition: "a feeling of listlessness from lack of excitement or occupation" },
    { word: "schadenfreude",pos: "noun",      definition: "pleasure derived from another person's misfortune" },
    { word: "sycophant",    pos: "noun",      definition: "a person who acts obsequiously toward those in power to gain favour" },
    { word: "fugacious",    pos: "adjective", definition: "tending to disappear; fleeting" },
    { word: "pensive",      pos: "adjective", definition: "engaged in deep or serious thought, often with a hint of sadness" },
    { word: "sophistry",    pos: "noun",      definition: "the use of clever but misleading arguments" },
    { word: "pyrrhic",      pos: "adjective", definition: "won at such a great cost that it is equivalent to defeat" },
    { word: "solipsism",    pos: "noun",      definition: "the philosophical view that the self is all that can be known to exist" },
    { word: "equanimity",   pos: "noun",      definition: "mental calmness and composure, especially in difficult situations" },
    { word: "didactic",     pos: "adjective", definition: "intended to teach or instruct, particularly in a moral sense" },
    { word: "insouciant",   pos: "adjective", definition: "casually unconcerned or indifferent; carefree" },
    { word: "verisimilitude",pos:"noun",      definition: "the appearance of being true or real" },
    { word: "ineffable",    pos: "adjective", definition: "too great or extreme to be expressed in words" },
    { word: "subterfuge",   pos: "noun",      definition: "deceit used in order to achieve one's goal" },
    { word: "recondite",    pos: "adjective", definition: "not known by many people; obscure or abstruse" },
    { word: "lassitude",    pos: "noun",      definition: "physical or mental weariness; lack of energy" },
    { word: "halcyon",      pos: "adjective", definition: "denoting a period of happiness, prosperity, and tranquility in the past" },
    { word: "susurrus",     pos: "noun",      definition: "a soft murmuring or whispering sound" },
    { word: "sonder",       pos: "noun",      definition: "the realisation that each passerby has a life as vivid and complex as your own" },
    { word: "apricity",     pos: "noun",      definition: "the warmth of the sun felt on a cold winter's day" },
    { word: "vellichor",    pos: "noun",      definition: "the strange wistfulness of used bookshops" },
    { word: "kenopsia",     pos: "noun",      definition: "the eerie atmosphere of a place that is usually busy but now deserted" },
    { word: "limerence",    pos: "noun",      definition: "the state of being obsessively infatuated with another person" },
    { word: "chrysalism",   pos: "noun",      definition: "the tranquil feeling of being safely indoors during a storm" },
  ];

  /* ════════════════════════════════════════════════════
   * CONSTANTS
   * ════════════════════════════════════════════════════ */
  // Days since Unix epoch (UTC) — same number for every user on the same day
  const DAY_INDEX    = Math.floor(Date.now() / 86400000);
  const WORD_INDEX   = DAY_INDEX % WORDS.length;
  const DAILY        = WORDS[WORD_INDEX];

  const TODAY_KEY    = `dictle_played_${DAY_INDEX}`;
  const STREAK_KEY   = `dictle_streak`;
  const LAST_DAY_KEY = `dictle_last_day`;

  /* ════════════════════════════════════════════════════
   * DOM REFS
   * ════════════════════════════════════════════════════ */
  const $  = id => document.getElementById(id);
  const wordDisplay    = $('word-display');
  const wordPos        = $('word-pos');
  const dayLabel       = $('day-label');
  const userInput      = $('user-input');
  const charCounter    = $('char-counter');
  const btnSubmit      = $('btn-submit');
  const errorBanner    = $('error-banner');
  const resultsCard    = $('results-card');
  const scoreNumber    = $('score-number');
  const ringFill       = $('ring-fill');
  const verdictText    = $('verdict-text');
  const resultUserDef  = $('result-user-def');
  const resultCorrectDef = $('result-correct-def');
  const btnShare       = $('btn-share');
  const streakCount    = $('streak-count');
  const alreadyPlayed  = $('already-played');
  const apScore        = $('ap-score');

  let lastScore = null;

  /* ════════════════════════════════════════════════════
   * INIT
   * ════════════════════════════════════════════════════ */
  function initUI() {
    dayLabel.textContent = `Word #${WORD_INDEX + 1} of ${WORDS.length}`;
    wordDisplay.textContent = DAILY.word;
    wordPos.textContent = DAILY.pos;
    streakCount.textContent = parseInt(localStorage.getItem(STREAK_KEY) || '0', 10);

    const saved = localStorage.getItem(TODAY_KEY);
    if (saved) {
      try {
        const data = JSON.parse(saved);
        showAlreadyPlayed(data.score, data.userDef);
        revealResults(data.score, data.userDef, false, data.feedback || '');
      } catch {
        localStorage.removeItem(TODAY_KEY); // corrupt data — reset
        btnSubmit.disabled = false;
      }
    } else {
      btnSubmit.disabled = false;
    }
  }

  /* ════════════════════════════════════════════════════
   * CHARACTER COUNTER
   * ════════════════════════════════════════════════════ */
  userInput.addEventListener('input', () => {
    const len = userInput.value.length;
    charCounter.textContent = `${len} / 150`;
    charCounter.className = 'char-counter' +
      (len >= 150 ? ' full' : len >= 120 ? ' warn' : '');
  });

  /* ════════════════════════════════════════════════════
   * SCORING — calls /api/score (Vercel Edge Function)
   * The edge function holds the Anthropic API key.
   * Falls back gracefully if the endpoint is unavailable.
   * ════════════════════════════════════════════════════ */
  async function computeScore(userText) {
    const trimmed = userText.trim();

    // Local edge cases — no API call needed
    if (trimmed.length === 0)  return { score: 0,  feedback: 'No definition entered.' };
    if (trimmed.length < 10)   return { score: Math.min(25, trimmed.length * 2), feedback: 'Too short to evaluate properly.' };

    const res = await fetch('/api/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        word:             DAILY.word,
        correctDefinition: DAILY.definition,
        userDefinition:   trimmed,
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    return res.json(); // { score, feedback }
  }

  /* ════════════════════════════════════════════════════
   * HELPERS
   * ════════════════════════════════════════════════════ */
  function getVerdict(score, feedback) {
    if (feedback) return feedback;
    if (score >= 90) return "✦ Perfect match";
    if (score >= 75) return "⬆ Strong definition";
    if (score >= 55) return "◈ Close, missing some ideas";
    if (score >= 35) return "▽ Partially correct";
    return "✕ Off the mark";
  }

  function scoreColor(score) {
    if (score >= 75) return 'var(--good)';
    if (score >= 45) return 'var(--mid)';
    return 'var(--bad)';
  }

  // Fixed: no longer produces 6 squares at 100
  function scoreToEmoji(score) {
    const filled = Math.round(score / 20);        // 0-5 squares
    const green  = Math.min(filled, 5);
    const empty  = 5 - green;
    const hasYellow = score >= 40 && score < 80 && green < 5;
    const actualEmpty = hasYellow ? empty - 1 : empty;
    return '🟩'.repeat(green) +
           (hasYellow ? '🟨' : '') +
           '⬜'.repeat(Math.max(0, actualEmpty));
  }

  /* ════════════════════════════════════════════════════
   * REVEAL RESULTS
   * ════════════════════════════════════════════════════ */
  function revealResults(score, userDef, animate = true, feedback = '') {
    resultUserDef.textContent    = userDef;
    resultCorrectDef.textContent = DAILY.definition;
    verdictText.textContent      = getVerdict(score, feedback);
    resultsCard.style.display    = 'block';
    lastScore = score;

    const circumference = 339.292;
    const offset = circumference - (score / 100) * circumference;
    ringFill.style.stroke = scoreColor(score);

    if (animate) {
      ringFill.style.strokeDashoffset = circumference;

      let current = 0;
      const step = Math.max(1, Math.ceil(score / 50));
      const interval = setInterval(() => {
        current = Math.min(current + step, score);
        scoreNumber.textContent = current;
        if (current >= score) clearInterval(interval);
      }, 20);

      requestAnimationFrame(() =>
        setTimeout(() => { ringFill.style.strokeDashoffset = offset; }, 50)
      );
    } else {
      scoreNumber.textContent = score;
      ringFill.style.strokeDashoffset = offset;
    }
  }

  function showAlreadyPlayed(score, userDef) {
    alreadyPlayed.style.display = 'block';
    apScore.textContent         = `${score}% match`;
    userInput.value             = userDef;
    userInput.disabled          = true;
    btnSubmit.disabled          = true;
  }

  function showError(msg) {
    errorBanner.textContent    = `⚠ ${msg}`;
    errorBanner.style.display  = 'block';
    btnSubmit.textContent      = 'Try again';
    btnSubmit.disabled         = false;
    userInput.disabled         = false;
  }

  function updateStreak() {
    const lastDay = parseInt(localStorage.getItem(LAST_DAY_KEY) || '0', 10);
    let streak    = parseInt(localStorage.getItem(STREAK_KEY)   || '0', 10);

    if      (lastDay === DAY_INDEX - 1) streak += 1;
    else if (lastDay !== DAY_INDEX)     streak  = 1;

    localStorage.setItem(STREAK_KEY,    streak);
    localStorage.setItem(LAST_DAY_KEY,  DAY_INDEX);
    streakCount.textContent = streak;
  }

  /* ════════════════════════════════════════════════════
   * SUBMIT
   * ════════════════════════════════════════════════════ */
  btnSubmit.addEventListener('click', async () => {
    const userDef = userInput.value.trim();

    if (!userDef) {
      userInput.style.borderColor = 'var(--bad)';
      setTimeout(() => { userInput.style.borderColor = ''; }, 800);
      return;
    }

    userInput.disabled    = true;
    btnSubmit.disabled    = true;
    btnSubmit.textContent = 'Scoring…';
    errorBanner.style.display = 'none';

    try {
      const { score, feedback } = await computeScore(userDef);

      localStorage.setItem(TODAY_KEY, JSON.stringify({ score, userDef, feedback }));
      updateStreak();

      revealResults(score, userDef, true, feedback);
      showAlreadyPlayed(score, userDef);

      setTimeout(() => {
        resultsCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 300);

    } catch (err) {
      console.error(err);
      showError('Scoring failed — check your connection and try again.');
    }
  });

  /* ════════════════════════════════════════════════════
   * COPY RESULT — three-tier fallback
   * ════════════════════════════════════════════════════ */
  btnShare.addEventListener('click', () => {
    const score = lastScore ?? 0;
    const text =
      `Dictle – Word #${WORD_INDEX + 1}\n` +
      `Score: ${score}/100\n\n` +
      scoreToEmoji(score) + '\n\n' +
      `Play at dictle.vercel.app`;

    function onCopied() {
      btnShare.textContent = '✓ Copied!';
      btnShare.classList.add('copied');
      setTimeout(() => {
        btnShare.innerHTML = '<span>📋</span> Copy result';
        btnShare.classList.remove('copied');
      }, 2000);
    }

    // Tier 1: modern Clipboard API (requires HTTPS + user gesture — works on Vercel)
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).then(onCopied).catch(legacyCopy);
      return;
    }
    legacyCopy();

    // Tier 2: execCommand — works in HTTP / older browsers
    function legacyCopy() {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        if (document.execCommand('copy')) { onCopied(); }
        else { showShareModal(text); }
      } catch { showShareModal(text); }
      document.body.removeChild(ta);
    }
  });

  // Tier 3: modal — user copies manually
  function showShareModal(text) {
    const overlay = document.createElement('div');
    overlay.style.cssText =
      'position:fixed;inset:0;background:rgba(0,0,0,0.75);' +
      'display:flex;align-items:center;justify-content:center;z-index:999;padding:24px';
    overlay.innerHTML = `
      <div style="background:var(--surface);border:1px solid var(--border);
        border-radius:12px;padding:24px;max-width:400px;width:100%">
        <p style="font-family:var(--font-mono);font-size:0.75rem;color:var(--muted);
          margin-bottom:12px;letter-spacing:0.1em">COPY YOUR RESULT</p>
        <textarea readonly style="width:100%;background:var(--bg);color:var(--text);
          border:1px solid var(--border);border-radius:8px;padding:12px;
          font-family:var(--font-mono);font-size:0.82rem;line-height:1.6;
          resize:none;height:120px;outline:none">${text}</textarea>
        <button onclick="this.closest('[style]').remove()" style="
          margin-top:12px;width:100%;padding:10px;background:var(--accent);
          color:var(--bg);border:none;border-radius:8px;font-family:var(--font-ui);
          font-weight:600;cursor:pointer">Close</button>
      </div>`;
    overlay.querySelector('textarea').addEventListener('focus', e => e.target.select());
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
    setTimeout(() => overlay.querySelector('textarea').select(), 50);
  }

  /* ════════════════════════════════════════════════════
   * BOOT
   * ════════════════════════════════════════════════════ */
  initUI();
</script>
</body>
