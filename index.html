  <script>
    // 1. YOUR ORIGINAL WORDS LIST IS STILL HERE

      { word: "Acre", definition: "A unit of land area...", phonetic: "/ˈākər/", pos: "noun" },

    ];

    // 2. YOUR ORIGINAL HINT LOGIC IS STILL HERE
    function revealHint() {

    }

    // 3. THE UPDATED SECURE SCORING LOGIC
    async function scoreDefinition(userDef, actualDef, word) {
      const response = await fetch('/api/score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          word: word,
          userDefinition: userDef,
          correctDefinition: actualDef
        }),
      });
      if (!response.ok) throw new Error('Scoring failed');
      const data = await response.json();
      return data.score;
    }

    // 4. ONE ATTEMPT LOCK-IN
    document.getElementById('submit-btn').addEventListener('click', async () => {
      const input = document.getElementById('def-input');
      const userDef = input.value.trim();
      if (!userDef) return;

      input.disabled = true;
      document.getElementById('submit-btn').disabled = true;

      try {
        const score = await scoreDefinition(userDef, currentWord.definition, currentWord.word);
        saveDailyResult(score, userDef); // This marks the day as 'played'
        showScoreReveal(score);
      } catch (err) {
        alert("Scoring server unavailable.");
        input.disabled = false;
        document.getElementById('submit-btn').disabled = false;
      }
    });

    /* ... [All other original functions: share results, stats, dark mode] ... */
  </script>
