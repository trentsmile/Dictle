<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <style>
    /* ... your original animations (rise, revealIn) and themes are untouched ... */
    
    /* Only hiding the retry and API key UI to enforce 1 attempt */
    .btn-retry, .reveal-attempt-warn, .reveal-attempt-counter, #api-key-modal { 
      display: none !important; 
    }
  </style>
</head>
<body>
  <script>
    // YOUR ORIGINAL WORDS LIST (All entries preserved)
    const WORDS = [
      { word: "Acre", definition: "A unit of land area...", phonetic: "/ˈākər/", pos: "noun" },
      // ... all other 220 words ...
    ];

    // UPDATED: Now calls your secure Vercel API route exclusively
    async function scoreDefinition(userDef, actualDef, word) {
      const response = await fetch('/api/score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          word: word,
          userDefinition: userDef,
          correctDefinition: actualDef
        }),
      });
      if (!response.ok) throw new Error('Scoring failed');
      const data = await response.json();
      return data.score;
    }

    // UPDATED: Submit logic now marks the game as played immediately
    document.getElementById('submit-btn').addEventListener('click', async () => {
      const input = document.getElementById('def-input');
      const userDef = input.value.trim();
      if (!userDef) return;

      input.disabled = true;
      document.getElementById('submit-btn').disabled = true;

      try {
        const score = await scoreDefinition(userDef, currentWord.definition, currentWord.word);
        saveDailyResult(score, userDef); // Correctly locks the game for the day
        showScoreReveal(score);
      } catch (err) {
        alert("Scoring server unavailable.");
        input.disabled = false;
        document.getElementById('submit-btn').disabled = false;
      }
    });

    /* ... [The rest of your original logic for hints, stats, and posters] ... */
  </script>
</body>
</html>
