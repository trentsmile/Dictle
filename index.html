<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictle – Daily Definition Game</title>
  <style>
    /* Remove existing API key modal styles */
    #api-key-modal, .api-key-box { display: none !important; }
    
    /* Ensure the "Try Again" button is hidden */
    .btn-retry, .reveal-attempt-warn, .reveal-attempt-counter { display: none !important; }
  </style>
</head>
<body>
  <header>
    <div class="logo">Dictle</div>
    </header>

  <main>
    <div class="card word-card">
      <div id="word-display"></div>
      <div id="word-phonetic"></div>
      <div id="word-pos"></div>
    </div>

    <div class="card" id="input-card">
      <div class="input-label">Your Definition</div>
      <textarea id="def-input" placeholder="What does this word mean to you?" maxlength="280"></textarea>
      <div class="char-counter" id="char-count">0 / 280</div>
      <button class="btn-submit" id="submit-btn">Submit Definition</button>
      <div class="error-banner" id="error-banner"></div>
    </div>

    <div class="card" id="results-card">
      </div>
  </main>

  <div id="score-reveal">
    <div class="reveal-word" id="reveal-word-text"></div>
    <div class="reveal-score" id="reveal-score-num">0</div>
    <div class="reveal-denom">/ 100</div>
    <div class="reveal-actions" id="reveal-actions-box">
      <button class="btn-lock" id="lock-score-btn">See Final Results</button>
      </div>
  </div>

  <script>
    // NEW SCORING LOGIC: Calls your Vercel backend exclusively
    async function scoreDefinition(userDef, actualDef, word) {
      const response = await fetch('/api/score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          word: word,
          userDefinition: userDef,
          correctDefinition: actualDef
        }),
      });
      
      if (!response.ok) throw new Error('Scoring failed');
      const data = await response.json();
      return data.score;
    }

    const submitBtn = document.getElementById('submit-btn');
    submitBtn.addEventListener('click', async () => {
      const userDef = document.getElementById('def-input').value.trim();
      if (!userDef) return;

      submitBtn.disabled = true; // Prevent double-clicks
      
      try {
        const score = await scoreDefinition(userDef, currentWord.definition, currentWord.word);
        
        // Save immediately to enforce 1 attempt
        saveDailyResult(score, userDef); 
        showScoreReveal(score);
      } catch (err) {
        document.getElementById('error-banner').textContent = "Score server unavailable.";
        document.getElementById('error-banner').style.display = "block";
        submitBtn.disabled = false;
      }
    });

    // Helper to hide score reveal and show final results
    document.getElementById('lock-score-btn').addEventListener('click', () => {
      document.getElementById('score-reveal').classList.remove('active');
      showResultsPage(); // Your existing function to show the poster
    });
  </script>
</body>
</html>
